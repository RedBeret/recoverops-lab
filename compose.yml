version: "3.8"

services:
  primary-db:
    image: "${POSTGRES_IMAGE:-postgres:17.6-alpine}"
    container_name: recoverops-primary-db
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-recoverops}"
    ports:
      - "127.0.0.1:${PRIMARY_DB_PORT:-55432}:5432"
    volumes:
      - primary-data:/var/lib/postgresql/data
      - ./lab/init.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
      - ./artifacts/backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-recoverops}"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  primary-api:
    build:
      context: ./app
      args:
        PYTHON_IMAGE: "${PYTHON_IMAGE:-python:3.12.11-slim}"
    container_name: recoverops-primary-api
    environment:
      SERVICE_NAME: primary
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@primary-db:5432/${POSTGRES_DB:-recoverops}"
    ports:
      - "127.0.0.1:${PRIMARY_API_PORT:-18080}:8080"
    depends_on:
      - primary-db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  recovery-db:
    image: "${POSTGRES_IMAGE:-postgres:17.6-alpine}"
    container_name: recoverops-recovery-db
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:${RECOVERY_DB_PORT:-55433}:5432"
    volumes:
      - recovery-data:/var/lib/postgresql/data
      - ./artifacts/restore:/restore
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  recovery-api:
    build:
      context: ./app
      args:
        PYTHON_IMAGE: "${PYTHON_IMAGE:-python:3.12.11-slim}"
    container_name: recoverops-recovery-api
    environment:
      SERVICE_NAME: recovery
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@recovery-db:5432/${POSTGRES_DB:-recoverops}"
    ports:
      - "127.0.0.1:${RECOVERY_API_PORT:-18081}:8080"
    depends_on:
      - recovery-db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  primary-data:
  recovery-data:
