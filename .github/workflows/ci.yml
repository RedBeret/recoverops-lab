name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Create non-secret Compose configuration
        run: cp .env.example .env

      - name: Bootstrap project environment
        run: ./scripts/bootstrap.sh

      - name: Run project validation
        run: |
          test -x scripts/bootstrap.sh
          test -x scripts/lab.sh
          ./scripts/lab.sh test

      - name: Build the API image
        run: docker compose -p recoverops -f compose.yml build primary-api
