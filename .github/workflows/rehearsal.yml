name: Recovery rehearsal

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * 1"

permissions:
  contents: read

jobs:
  rehearse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Bootstrap the lab
        run: ./scripts/bootstrap.sh

      - name: Run destructive recovery rehearsal
        run: ./scripts/lab.sh rehearse --apply

      - name: Upload recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recoverops-evidence
          path: artifacts/reports/
          if-no-files-found: error
          retention-days: 30

      - name: Tear down lab
        if: always()
        run: ./scripts/lab.sh down
